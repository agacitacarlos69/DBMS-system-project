<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EMS — Profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-800">
  <div id="ems-nav"></div>

  <main class="mx-auto max-w-3xl p-6">
    <div class="mb-6">
      <h1 class="text-2xl font-bold text-slate-800">Profile</h1>
      <p class="mt-1 text-sm text-slate-500">Manager account &amp; handoff information.</p>
    </div>

    <section class="mb-6 rounded-xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
      <h2 class="mb-4 text-lg font-semibold text-slate-800">Manager account</h2>
      <label for="username" class="mb-1 block text-sm font-medium text-slate-700">Username</label>
      <input id="username" type="text" readonly class="w-full rounded-lg border border-slate-300 bg-slate-50 px-3 py-2 text-sm text-slate-700" />
    </section>

    <section class="mb-6 rounded-xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
      <h2 class="mb-4 text-lg font-semibold text-slate-800">Handoff notes</h2>
      <form id="notesForm">
        <label for="handoffNotes" class="mb-1 block text-sm font-medium text-slate-700">Notes for the next manager (credentials handoff, pending tasks, etc.)</label>
        <textarea id="handoffNotes" rows="8" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500"></textarea>
        <div class="mt-4 flex justify-end">
          <button type="submit" class="rounded-lg bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700">Save notes</button>
        </div>
      </form>
    </section>

    <section class="rounded-xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
      <h2 class="mb-4 text-lg font-semibold text-slate-800">Change manager password</h2>
      <form id="passwordForm" class="space-y-4">
        <div>
          <label for="currentPassword" class="mb-1 block text-sm font-medium text-slate-700">Current password</label>
          <div class="flex gap-2">
            <input id="currentPassword" type="password" required class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm" />
            <button type="button" data-toggle="currentPassword" class="rounded-lg bg-white px-3 py-2 text-sm ring-1 ring-slate-300 hover:bg-slate-100">Show</button>
          </div>
        </div>
        <div>
          <label for="newPassword" class="mb-1 block text-sm font-medium text-slate-700">New password</label>
          <div class="flex gap-2">
            <input id="newPassword" type="password" required class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm" />
            <button type="button" data-toggle="newPassword" class="rounded-lg bg-white px-3 py-2 text-sm ring-1 ring-slate-300 hover:bg-slate-100">Show</button>
          </div>
        </div>
        <div>
          <label for="confirmPassword" class="mb-1 block text-sm font-medium text-slate-700">Confirm new password</label>
          <div class="flex gap-2">
            <input id="confirmPassword" type="password" required class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm" />
            <button type="button" data-toggle="confirmPassword" class="rounded-lg bg-white px-3 py-2 text-sm ring-1 ring-slate-300 hover:bg-slate-100">Show</button>
          </div>
        </div>
        <div class="flex justify-end">
          <button type="submit" class="rounded-lg bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700">Change password</button>
        </div>
      </form>
    </section>
  </main>

  <script src="app.js"></script>
  <script>
    const API = 'http://localhost:5000';
    const token = localStorage.getItem('ems_token');
    if (!token) location.replace('login.html');
    EMS.buildNav('profile');
    const user = JSON.parse(localStorage.getItem('ems_user') || '{}');

    function esc(s) { return String(s ?? '').replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

    async function api(method, path, body) {
      const opts = { method, headers: { Authorization: 'Bearer ' + token } };
      if (body !== undefined) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
      const res = await fetch(API + path, opts).catch(() => { throw new Error('Network error — is the backend running?'); });
      if (res.status === 401) { localStorage.clear(); location.href = 'login.html'; throw new Error('unauth'); }
      const text = await res.text();
      const data = text ? (() => { try { return JSON.parse(text); } catch { return text; } })() : null;
      if (!res.ok) throw new Error((data && data.message) || `${res.status} ${res.statusText}`);
      return data;
    }

    async function loadProfile() {
      try {
        const data = await api('GET', '/api/profile');
        document.getElementById('username').value = data.username || user.username || 'Manager';
        document.getElementById('handoffNotes').value = data.handoff_notes || '';
      } catch (err) {
        EMS.toast(err.message, 'error');
      }
    }

    document.getElementById('notesForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        await api('PUT', '/api/profile', { handoff_notes: document.getElementById('handoffNotes').value });
        EMS.toast('Handoff notes saved.', 'success');
      } catch (err) {
        EMS.toast(err.message, 'error');
      }
    });

    document.querySelectorAll('button[data-toggle]').forEach((btn) => {
      btn.addEventListener('click', () => {
        const input = document.getElementById(btn.dataset.toggle);
        const show = input.type === 'password';
        input.type = show ? 'text' : 'password';
        btn.textContent = show ? 'Hide' : 'Show';
      });
    });

    document.getElementById('passwordForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const current = document.getElementById('currentPassword');
      const next = document.getElementById('newPassword');
      const confirm = document.getElementById('confirmPassword');
      if (next.value !== confirm.value) { EMS.toast('New passwords do not match.', 'error'); return; }
      if (next.value.length < 6) { EMS.toast('New password must be at least 6 characters.', 'error'); return; }
      try {
        await api('POST', '/api/profile/change-password', { current_password: current.value, new_password: next.value });
        EMS.toast('Password changed successfully.', 'success');
        current.value = ''; next.value = ''; confirm.value = '';
      } catch (err) {
        EMS.toast(err.message, 'error');
      }
    });

    loadProfile();
  </script>
</body>
</html>
