<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EMS — Sign In</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-800">
  <main class="flex min-h-screen items-center justify-center p-6">
    <div class="w-full max-w-sm rounded-2xl bg-white p-8 shadow-lg ring-1 ring-slate-200">
      <div class="mb-6 text-center">
        <div class="text-3xl font-bold text-slate-900">EMS<span class="text-blue-600">.</span></div>
        <p class="mt-1 text-sm text-slate-500">Manager Console — Sign in</p>
      </div>
      <form id="frm" class="space-y-4">
        <div>
          <label class="mb-1 block text-sm font-medium text-slate-700">Username</label>
          <input name="username" required class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500" />
        </div>
        <div>
          <label class="mb-1 block text-sm font-medium text-slate-700">Password</label>
          <div class="relative">
            <input name="password" type="password" required class="w-full rounded-lg border border-slate-300 px-3 py-2 pr-10 text-sm focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500" />
            <button type="button" id="togglePw" aria-label="Show password" class="absolute inset-y-0 right-0 flex items-center px-3 text-slate-400 hover:text-slate-600">
              <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12s3.75-7.5 9.75-7.5 9.75 7.5 9.75 7.5-3.75 7.5-9.75 7.5S2.25 12 2.25 12z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>
        <div id="errBox" class="hidden rounded-lg bg-red-50 px-3 py-2 text-sm text-red-700 ring-1 ring-red-200"></div>
        <button id="submitBtn" type="submit" class="w-full rounded-lg bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700">Sign in</button>
      </form>
      <div class="mt-3 text-center">
        <button type="button" id="forgotLink" class="text-xs font-medium text-blue-600 hover:underline">Forgot password?</button>
      </div>
      <p class="mt-4 text-center text-xs text-slate-400">Sign in with your manager credentials.</p>
    </div>
  </main>

  <!-- Simulated forgot-password flow -->
  <dialog id="fpDlg" class="rounded-2xl p-0 backdrop:bg-slate-900/50">
    <div class="w-[26rem] max-w-[95vw] bg-white p-6">
      <div class="mb-4 flex items-center justify-between">
        <h2 class="text-lg font-semibold text-slate-800">Reset password</h2>
        <button type="button" id="fpClose" class="rounded p-1 text-slate-400 hover:bg-slate-100 hover:text-slate-700">✕</button>
      </div>

      <!-- Step 1: request a code -->
      <form id="fpRequestForm" class="space-y-3">
        <p class="text-sm text-slate-500">Enter your manager username. A reset code will be generated (simulated email — shown here and in the server console).</p>
        <input name="username" required placeholder="Manager username" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500" />
        <button type="submit" class="w-full rounded-lg bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700">Send reset code</button>
      </form>

      <!-- Step 2: enter code + new password -->
      <form id="fpResetForm" class="hidden space-y-3">
        <div id="fpCodeNote" class="rounded-lg bg-blue-50 px-3 py-2 text-xs text-blue-700 ring-1 ring-blue-200"></div>
        <input name="code" required placeholder="6-digit reset code" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500" />
        <input name="new_password" required type="password" placeholder="New password" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500" />
        <button type="submit" class="w-full rounded-lg bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700">Set new password</button>
      </form>

      <div id="fpErr" class="mt-3 hidden rounded-lg bg-red-50 px-3 py-2 text-sm text-red-700 ring-1 ring-red-200"></div>
    </div>
  </dialog>
  <script src="app.js"></script>
  <script>
    const API = 'http://localhost:5000';
    if (localStorage.getItem('ems_token')) location.replace('index.html');
    const frm = document.getElementById('frm');
    const errBox = document.getElementById('errBox');

    /* ----- Password eye toggle ----- */
    const togglePw = document.getElementById('togglePw');
    const pwInput = frm.elements.password;
    togglePw.addEventListener('click', () => {
      const show = pwInput.type === 'password';
      pwInput.type = show ? 'text' : 'password';
      togglePw.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
      document.getElementById('eyeIcon').style.opacity = show ? '0.5' : '1';
    });

    frm.addEventListener('submit', async (e) => {
      e.preventDefault();
      errBox.classList.add('hidden');
      const fd = new FormData(frm);
      const body = { username: fd.get('username'), password: fd.get('password') };
      const btn = document.getElementById('submitBtn');
      btn.disabled = true; btn.textContent = 'Signing in…';
      try {
        const res = await fetch(API + '/api/auth/login', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        }).catch(() => { throw new Error('Network error — is the backend running?'); });
        const text = await res.text();
        const data = text ? JSON.parse(text) : null;
        if (!res.ok) throw new Error((data && data.message) || 'Sign-in failed');
        localStorage.setItem('ems_token', data.token);
        localStorage.setItem('ems_user', JSON.stringify(data.user || {}));
        EMS.toast('Signed in successfully. Redirecting…', 'success', 2000);
        setTimeout(() => location.replace('index.html'), 600);
      } catch (err) {
        errBox.textContent = err.message;
        errBox.classList.remove('hidden');
      } finally { btn.disabled = false; btn.textContent = 'Sign in'; }
    });

    /* ----- Simulated forgot-password flow ----- */
    const fpDlg = document.getElementById('fpDlg');
    const fpRequestForm = document.getElementById('fpRequestForm');
    const fpResetForm = document.getElementById('fpResetForm');
    const fpErr = document.getElementById('fpErr');
    const fpCodeNote = document.getElementById('fpCodeNote');
    let fpUsername = '';

    function fpShowErr(msg) { fpErr.textContent = msg; fpErr.classList.remove('hidden'); }
    function fpReset() {
      fpRequestForm.reset(); fpResetForm.reset();
      fpRequestForm.classList.remove('hidden'); fpResetForm.classList.add('hidden');
      fpErr.classList.add('hidden'); fpCodeNote.textContent = '';
    }

    document.getElementById('forgotLink').addEventListener('click', () => { fpReset(); fpDlg.showModal(); });
    document.getElementById('fpClose').addEventListener('click', () => fpDlg.close());

    fpRequestForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      fpErr.classList.add('hidden');
      fpUsername = new FormData(fpRequestForm).get('username');
      try {
        const res = await fetch(API + '/api/auth/forgot-password', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: fpUsername }),
        }).catch(() => { throw new Error('Network error — is the backend running?'); });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.message || 'Could not start reset.');
        fpRequestForm.classList.add('hidden');
        fpResetForm.classList.remove('hidden');
        fpCodeNote.textContent = data.simulated_code
          ? `Simulated email — your reset code is: ${data.simulated_code}`
          : 'A reset code has been generated (check the server console).';
      } catch (err) { fpShowErr(err.message); }
    });

    fpResetForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      fpErr.classList.add('hidden');
      const fd = new FormData(fpResetForm);
      try {
        const res = await fetch(API + '/api/auth/reset-password', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: fpUsername, code: fd.get('code'), new_password: fd.get('new_password') }),
        }).catch(() => { throw new Error('Network error — is the backend running?'); });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.message || 'Could not reset password.');
        fpDlg.close();
        EMS.toast('Password updated. You can now sign in.', 'success', 5000);
      } catch (err) { fpShowErr(err.message); }
    });
  </script>
</body>
</html>
