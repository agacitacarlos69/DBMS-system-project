<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EMS — Employees</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-800">
  <div id="ems-nav"></div>

  <main class="mx-auto max-w-7xl p-6">
    <div class="mb-4 flex items-center justify-between">
      <h1 class="text-2xl font-bold text-slate-800">Employees</h1>
      <button id="newBtn" class="rounded-lg bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700">+ New</button>
    </div>
    <div class="mb-3 flex flex-wrap items-center justify-between gap-2">
      <div class="flex flex-1 flex-wrap gap-2">
        <input id="search" placeholder="Search ID / email / contact…" class="w-full max-w-xs rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500" />
        <input id="nameFilter" placeholder="Filter by name…" class="w-full max-w-xs rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500" />
        <select id="roleFilter" class="w-full max-w-xs rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500">
          <option value="">All roles</option>
        </select>
        <select id="statusFilter" class="w-full max-w-xs rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500">
          <option value="">All statuses</option>
          <option value="Active">Active</option>
          <option value="Inactive">Inactive</option>
        </select>
        <select id="tenurityFilter" class="w-full max-w-xs rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500">
          <option value="">All tenurities</option>
        </select>
      </div>
      <div id="countLabel" class="text-sm text-slate-500"></div>
    </div>
    <div class="overflow-x-auto rounded-xl bg-white shadow-sm ring-1 ring-slate-200">
      <table class="min-w-full divide-y divide-slate-200 text-sm">
        <thead class="bg-slate-50 text-left text-xs font-semibold uppercase tracking-wide text-slate-600">
          <tr>
            <th class="px-4 py-3">EMP_ID</th>
            <th id="nameSort" class="cursor-pointer select-none px-4 py-3">Name <span id="nameSortIcon" class="ml-1">▲</span></th>
            <th class="px-4 py-3">Mgmt</th>
            <th class="px-4 py-3">Role</th>
            <th class="px-4 py-3">Tenurity</th>
            <th class="px-4 py-3">Status</th>
            <th class="px-4 py-3 text-right">Actions</th>
          </tr>
        </thead>
        <tbody id="tbody" class="divide-y divide-slate-100"></tbody>
      </table>
    </div>
    <div class="mt-3 flex flex-wrap items-center justify-end gap-3 text-sm text-slate-600">
      <button id="prevPage" class="rounded-lg bg-white px-3 py-1.5 ring-1 ring-slate-300 hover:bg-slate-50 disabled:cursor-not-allowed disabled:opacity-50">Prev</button>
      <span id="pageLabel">Page 1 of 1</span>
      <button id="nextPage" class="rounded-lg bg-white px-3 py-1.5 ring-1 ring-slate-300 hover:bg-slate-50 disabled:cursor-not-allowed disabled:opacity-50">Next</button>
      <span id="totalLabel" class="text-slate-500">(0 records)</span>
    </div>
  </main>

  <dialog id="dlg" class="rounded-xl p-0 backdrop:bg-slate-900/50">
    <form id="frm" class="w-[40rem] max-w-[95vw] bg-white">
      <div class="flex items-center justify-between border-b border-slate-200 px-6 py-4">
        <h2 id="dlgTitle" class="text-lg font-semibold text-slate-800">Employees</h2>
        <button type="button" id="closeBtn" class="rounded p-1 text-slate-400 hover:bg-slate-100 hover:text-slate-700">✕</button>
      </div>
      <div class="grid grid-cols-1 gap-4 px-6 py-5 md:grid-cols-2">
        <div class=""><label class="mb-1 block text-sm font-medium text-slate-700">Employee ID *</label>
          <input type="text" name="emp_id" required class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm" /></div>
        <div class=""><label class="mb-1 block text-sm font-medium text-slate-700">Full Name *</label>
          <input type="text" name="full_name" required class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm" /></div>
        <div><label class="mb-1 block text-sm font-medium text-slate-700">Management Assignment *</label>
          <select name="mgmt_id" required class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm bg-white"></select></div>
        <div class=""><label class="mb-1 block text-sm font-medium text-slate-700">Role *</label>
          <select name="role" required class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm"><option value="Core">Core</option><option value="Project">Project</option><option value="SME">SME</option><option value="Team Lead">Team Lead</option></select></div>
        <div class=""><label class="mb-1 block text-sm font-medium text-slate-700">Tenurity *</label>
          <select name="tenurity" required class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm"><option value="New Joiner">New Joiner</option><option value="Repeater">Repeater</option><option value="Returnee">Returnee</option></select></div>
        <div class=""><label class="mb-1 block text-sm font-medium text-slate-700">Status *</label>
          <select name="status" required class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm"><option value="">— select —</option><option value="Active">Active</option><option value="Inactive">Inactive</option></select></div>
        <div class=""><label class="mb-1 block text-sm font-medium text-slate-700">Personal Email</label>
          <input type="email" name="personal_email" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm" /></div>
        <div class=""><label class="mb-1 block text-sm font-medium text-slate-700">Contact Number</label>
          <input type="text" name="contact_number" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm" /></div>
      </div>
      <div id="frmErr" class="mx-6 mb-3 hidden rounded-lg bg-red-50 px-3 py-2 text-sm text-red-700 ring-1 ring-red-200"></div>
      <div class="flex justify-end gap-2 border-t border-slate-200 bg-slate-50 px-6 py-3">
        <button type="button" id="cancelBtn" class="rounded-lg bg-white px-4 py-2 text-sm ring-1 ring-slate-300 hover:bg-slate-100">Cancel</button>
        <button type="submit" id="saveBtn" class="rounded-lg bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700">Save</button>
      </div>
    </form>
  </dialog>
  <script src="app.js"></script>
  <script>
    const API = 'http://localhost:5000';
    const token = localStorage.getItem('ems_token');
    if (!token) location.replace('login.html');
    EMS.buildNav('employees');
    const user = JSON.parse(localStorage.getItem('ems_user') || '{}');

    function esc(s) { return String(s ?? '').replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
    function fmtDT(v) { if (!v) return ''; const d = new Date(v); return isNaN(d) ? String(v) : d.toLocaleString(); }
    function toLocalInput(v) { if (!v) return ''; const d = new Date(v); if (isNaN(d)) return ''; const pad = n => String(n).padStart(2,'0'); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+'T'+pad(d.getHours())+':'+pad(d.getMinutes()); }

    async function api(method, path, body) {
      const opts = { method, headers: { Authorization: 'Bearer ' + token } };
      if (body !== undefined) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
      const res = await fetch(API + path, opts).catch(() => { throw new Error('Network error — is the backend running?'); });
      if (res.status === 401) { localStorage.clear(); location.href = 'login.html'; throw new Error('unauth'); }
      const text = await res.text();
      const data = text ? (() => { try { return JSON.parse(text); } catch { return text; } })() : null;
      if (!res.ok) throw new Error((data && data.message) || `${res.status} ${res.statusText}`);
      return data;
    }

    let rows = []; let editingId = null; let editingPrev = null;
    let currentPage = 1; const pageSize = 10; let nameSortDir = 'asc';
    const dlg = document.getElementById('dlg');
    const frm = document.getElementById('frm');
    const frmErr = document.getElementById('frmErr');

    function badgeClass(v) {
      if (v === 'Active') return 'bg-green-50 text-green-700 ring-green-200';
      if (v === 'Inactive') return 'bg-slate-50 text-slate-700 ring-slate-200';
      return 'bg-slate-50 text-slate-700 ring-slate-200';
    }

    function getFilterValue(id) { return document.getElementById(id).value.trim(); }

    function populateFilterOptions() {
      const unique = (key) => [...new Set(rows.map((r) => r[key]).filter((v) => v != null && String(v).trim() !== '').map(String))].sort((a,b) => a.localeCompare(b));
      const build = (id, label, values) => {
        const sel = document.getElementById(id);
        const prev = sel.value;
        sel.innerHTML = `<option value="">${label}</option>`;
        values.forEach((value) => {
          const opt = document.createElement('option');
          opt.value = value; opt.textContent = value;
          sel.appendChild(opt);
        });
        sel.value = values.includes(prev) ? prev : '';
      };
      const statuses = ['Active', 'Inactive', ...unique('status').filter((v) => v !== 'Active' && v !== 'Inactive')];
      build('roleFilter', 'All roles', unique('role'));
      build('statusFilter', 'All statuses', statuses);
      build('tenurityFilter', 'All tenurities', unique('tenurity'));
    }

    function render(resetPage = false) {
      if (resetPage) currentPage = 1;
      const q = getFilterValue('search').toLowerCase();
      const nameQ = getFilterValue('nameFilter').toLowerCase();
      const role = getFilterValue('roleFilter');
      const status = getFilterValue('statusFilter');
      const tenurity = getFilterValue('tenurityFilter');
      const searchKeys = ["emp_id","personal_email","contact_number","mgmt_id"];
      const filtered = rows.filter((r) => {
        const matchesSearch = !q || searchKeys.some((k) => String(r[k] ?? '').toLowerCase().includes(q));
        const matchesName = !nameQ || String(r.full_name ?? '').toLowerCase().includes(nameQ);
        const matchesRole = !role || String(r.role ?? '') === role;
        const matchesStatus = !status || String(r.status ?? '') === status;
        const matchesTenurity = !tenurity || String(r.tenurity ?? '') === tenurity;
        return matchesSearch && matchesName && matchesRole && matchesStatus && matchesTenurity;
      });
      filtered.sort((a,b) => {
        const byName = String(a.full_name ?? '').localeCompare(String(b.full_name ?? ''), undefined, { sensitivity: 'base' });
        const primary = nameSortDir === 'asc' ? byName : -byName;
        return primary || String(a.emp_id ?? '').localeCompare(String(b.emp_id ?? ''));
      });
      const totalPages = Math.max(1, Math.ceil(filtered.length / pageSize));
      if (currentPage > totalPages) currentPage = totalPages;
      const pageRows = filtered.slice((currentPage - 1) * pageSize, currentPage * pageSize);
      document.getElementById('countLabel').textContent = `${filtered.length} record(s)`;
      document.getElementById('pageLabel').textContent = `Page ${currentPage} of ${totalPages}`;
      document.getElementById('totalLabel').textContent = `(${filtered.length} records)`;
      document.getElementById('prevPage').disabled = currentPage <= 1;
      document.getElementById('nextPage').disabled = currentPage >= totalPages;
      document.getElementById('nameSortIcon').textContent = nameSortDir === 'asc' ? '▲' : '▼';
      const tbody = document.getElementById('tbody');
      if (filtered.length === 0) { tbody.innerHTML = `<tr><td colspan="7" class="px-4 py-8 text-center text-slate-500">No records.</td></tr>`; return; }
      tbody.innerHTML = pageRows.map((r) => `
        <tr class="hover:bg-slate-50">
            <td class="px-4 py-3 font-mono">${esc(r.emp_id)}</td>
            <td class="px-4 py-3">${esc(r.full_name)}</td>
            <td class="px-4 py-3">${esc(r.mgmt_id)}</td>
            <td class="px-4 py-3">${esc(r.role)}</td>
            <td class="px-4 py-3">${esc(r.tenurity)}</td>
            <td class="px-4 py-3"><span class="rounded-full px-2 py-0.5 text-xs ring-1 ring-inset ${badgeClass(r.status)}">${esc(r.status)}</span></td>
          <td class="px-4 py-3 text-right">
            <button data-act="edit" data-id="${esc(r.emp_id)}" class="rounded bg-white px-2.5 py-1 text-xs ring-1 ring-slate-300 hover:bg-slate-50">Edit</button>
            <button data-act="del"  data-id="${esc(r.emp_id)}" class="ml-1 rounded bg-red-600 px-2.5 py-1 text-xs text-white hover:bg-red-700">Delete</button>
          </td>
        </tr>`).join('');
      tbody.querySelectorAll('button[data-act]').forEach((b) => {
        b.addEventListener('click', () => {
          const id = b.getAttribute('data-id');
          if (b.getAttribute('data-act') === 'edit') openForm(rows.find((x) => String(x.emp_id) === id));
          else deleteRow(id);
        });
      });
    }

    async function loadRows() {
      try {
        const data = await api('GET', '/api/employees');
        rows = Array.isArray(data) ? data : (data.items || []);
        populateFilterOptions();
        render();
      } catch (e) {
        document.getElementById('tbody').innerHTML = `<tr><td colspan="7" class="px-4 py-8 text-center text-red-600">${esc(e.message)}</td></tr>`;
      }
    }

    async function loadFKs() {
      try {
        const data = await api('GET', '/api/management');
        const items = Array.isArray(data) ? data : (data.items || []);
        const sel = frm.querySelector('select[name="mgmt_id"]');
        if (sel) {
          sel.innerHTML = '<option value="">— select —</option>';
          items.forEach((it) => {
            const opt = document.createElement('option');
            opt.value = it.mgmt_id; opt.textContent = `${it.mgmt_id}`;
            sel.appendChild(opt);
          });
        }
      } catch {} 
      try {
        const data = await api('GET', '/api/roles');
        const items = Array.isArray(data) ? data : (data.items || []);
        const sel = frm.querySelector('select[name="role"]');
        if (sel) {
          sel.innerHTML = '<option value="">— select —</option>';
          items.forEach((it) => {
            const opt = document.createElement('option');
            opt.value = it.role_type; opt.textContent = `${it.role_type}`;
            sel.appendChild(opt);
          });
        }
      } catch {}
      try {
        const data = await api('GET', '/api/tenurities');
        const items = Array.isArray(data) ? data : (data.items || []);
        const sel = frm.querySelector('select[name="tenurity"]');
        if (sel) {
          sel.innerHTML = '<option value="">— select —</option>';
          items.forEach((it) => {
            const opt = document.createElement('option');
            opt.value = it.class; opt.textContent = `${it.class}`;
            sel.appendChild(opt);
          });
        }
      } catch {}
    }

    async function openForm(row) {
      editingId = row ? row.emp_id : null;
      editingPrev = row ? Object.assign({}, row) : null;
      document.getElementById('dlgTitle').textContent = row ? 'Edit Employee' : 'New Employee';
      frmErr.classList.add('hidden'); frmErr.textContent = '';
      frm.reset();
      await loadFKs();
      if (row) {
        Object.keys(row).forEach((k) => {
          const el = frm.elements[k];
          if (!el || el.type === 'file') return;
          if (el.type === 'datetime-local') return;
          if (k === 'password') return;
          el.value = row[k] ?? '';
        });

        frm.elements.emp_id.value = row.emp_id;
        frm.elements.emp_id.disabled = true;
      } else {

        frm.elements.emp_id.disabled = false;
      }
      dlg.showModal();
    }

    document.getElementById('newBtn').addEventListener('click', () => openForm(null));
    document.getElementById('cancelBtn').addEventListener('click', () => dlg.close());
    document.getElementById('closeBtn').addEventListener('click', () => dlg.close());
    ['search', 'nameFilter'].forEach((id) => document.getElementById(id).addEventListener('input', () => render(true)));
    ['roleFilter', 'statusFilter', 'tenurityFilter'].forEach((id) => document.getElementById(id).addEventListener('change', () => render(true)));
    document.getElementById('nameSort').addEventListener('click', () => {
      nameSortDir = nameSortDir === 'asc' ? 'desc' : 'asc';
      render(true);
    });
    document.getElementById('prevPage').addEventListener('click', () => {
      if (currentPage > 1) { currentPage--; render(); }
    });
    document.getElementById('nextPage').addEventListener('click', () => {
      currentPage++; render();
    });

    frm.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (editingId != null && !EMS.confirmEdit('Are you sure you want to save changes to this employee?')) return;
      frmErr.classList.add('hidden');
      const fd = new FormData(frm);
      const body = {};
      fd.forEach((v, k) => { body[k] = v === '' ? null : v; });


      const saveBtn = document.getElementById('saveBtn');
      saveBtn.disabled = true; saveBtn.textContent = 'Saving…';
      try {

        let saved;
        if (editingId == null) saved = await api('POST', '/api/employees', body);
        else saved = await api('PUT', '/api/employees/' + encodeURIComponent(editingId), body);
      if (saved && saved._cascade && saved._cascade.length) {
        window.emsToast && window.emsToast('Auto-link:\n' + saved._cascade.map(x => '• ' + x).join('\n'));
      }
        dlg.close(); await loadRows();
      } catch (err) { frmErr.textContent = err.message; frmErr.classList.remove('hidden'); }
      finally { saveBtn.disabled = false; saveBtn.textContent = 'Save'; }
    });

    async function deleteRow(id) {
  // 1. Find the employee details from the local array to make a friendly confirmation message
  const r = rows.find((x) => String(x.emp_id) === String(id));
  const label = r ? `${r.full_name} (${r.emp_id})` : `Employee ${id}`;
  
  // 2. Use a standard native browser alert confirmation box
  if (!confirm(`Are you sure you want to delete ${label}?`)) {
    return; // Stop if the user clicks "Cancel"
  }

  try {
    // 3. Make the actual DELETE request to your Express server.js backend
    await api('DELETE', '/api/employees/' + encodeURIComponent(id));
    
    // 4. Refresh the data table automatically upon a successful delete
    await loadRows();
  } catch (err) {
    alert('Failed to delete record: ' + err.message);
  }
}

    loadRows();
  </script>
</body>
</html>
