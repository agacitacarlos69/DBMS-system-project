<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EMS — Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-800">
  <div id="ems-nav"></div>

  <main class="mx-auto max-w-7xl p-6">
    <div class="mb-6 flex flex-wrap items-center justify-between gap-3">
      <div>
        <h1 class="mb-1 text-2xl font-bold text-slate-800">Dashboard</h1>
        <p class="text-sm text-slate-500">Quick overview of all records.</p>
      </div>
      <a href="employees.html" class="inline-flex items-center gap-2 rounded-lg bg-blue-600 px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-blue-700">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a4 4 0 00-3-3.87M9 20H4v-2a4 4 0 013-3.87m6-1.13a4 4 0 10-4-4 4 4 0 004 4z"/></svg>
        View all employees
      </a>
    </div>
    <div id="cards" class="grid grid-cols-2 gap-4 sm:grid-cols-3 lg:grid-cols-4"></div>

    <!-- ===== Employee Summary Table ===== -->
    <section class="mt-10">
      <div class="mb-2 flex flex-wrap items-center justify-between gap-2">
        <div>
          <h2 class="text-xl font-bold text-slate-800">Employee Summary</h2>
          <p class="text-sm text-slate-500">Team Leads, SMEs, Trainings, Shifts, Rooms &amp; Management — up to 30 employees.</p>
        </div>
        <input id="summarySearch" placeholder="Search employees…" class="w-full max-w-xs rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500" />
      </div>
      <div class="mb-2 text-right text-sm text-slate-500"><span id="summaryCount"></span></div>
      <div class="overflow-x-auto rounded-xl bg-white shadow-sm ring-1 ring-slate-200">
        <table class="min-w-full divide-y divide-slate-200 text-sm">
          <thead class="bg-slate-50 text-left text-xs font-semibold uppercase tracking-wide text-slate-600">
            <tr>
              <th class="px-4 py-3">EMP_ID</th>
              <th class="px-4 py-3">Name</th>
              <th class="px-4 py-3">Role</th>
              <th class="px-4 py-3">Status</th>
              <th class="px-4 py-3">Management</th>
              <th class="px-4 py-3">Team Lead</th>
              <th class="px-4 py-3">SME</th>
              <th class="px-4 py-3">Training</th>
              <th class="px-4 py-3">Shift</th>
              <th class="px-4 py-3">Room</th>
            </tr>
          </thead>
          <tbody id="summaryBody" class="divide-y divide-slate-100"></tbody>
        </table>
      </div>
    </section>
  </main>
  <script src="app.js"></script>
  <script>
    const API = 'http://localhost:5000';
    const token = localStorage.getItem('ems_token');
    if (!token) location.replace('login.html');
    EMS.buildNav('dashboard');
    const user = JSON.parse(localStorage.getItem('ems_user') || '{}');

    function esc(s) { return String(s ?? '').replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
    function fmtDT(v) { if (!v) return ''; const d = new Date(v); return isNaN(d) ? String(v) : d.toLocaleString(); }
    function toLocalInput(v) { if (!v) return ''; const d = new Date(v); if (isNaN(d)) return ''; const pad = n => String(n).padStart(2,'0'); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+'T'+pad(d.getHours())+':'+pad(d.getMinutes()); }

    async function api(method, path, body) {
      const opts = { method, headers: { Authorization: 'Bearer ' + token } };
      if (body !== undefined) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
      const res = await fetch(API + path, opts).catch(() => { throw new Error('Network error — is the backend running?'); });
      if (res.status === 401) { localStorage.clear(); location.href = 'login.html'; throw new Error('unauth'); }
      const text = await res.text();
      const data = text ? (() => { try { return JSON.parse(text); } catch { return text; } })() : null;
      if (!res.ok) throw new Error((data && data.message) || `${res.status} ${res.statusText}`);
      return data;
    }

    const items = [
      ['Employees',  '/api/employees',  'employees.html'],
      ['Management', '/api/management', 'management.html'],
      ['Team Leads', '/api/team-leads', 'team-leads.html'],
      ['SMEs',       '/api/smes',       'smes.html'],
      ['Trainings',  '/api/trainings',  'schedules.html'],
      ['Shifts',     '/api/shifts',     'schedules.html'],
      ['Rooms',      '/api/rooms',      'rooms.html'],
      ['Users',      '/api/users',      'users.html'],
    ];
    const host = document.getElementById('cards');
    items.forEach(([label, path, href]) => {
      const card = document.createElement('a');
      card.href = href;
      card.className = 'block rounded-xl bg-white p-5 shadow-sm ring-1 ring-slate-200 hover:ring-blue-300';
      card.innerHTML = `<div class="text-sm font-medium text-slate-500">${label}</div>
        <div class="mt-2 text-3xl font-bold text-slate-800" data-count>—</div>`;
      host.appendChild(card);
      api('GET', path).then((data) => {
        const items = Array.isArray(data) ? data : (data.items || []);
        card.querySelector('[data-count]').textContent = items.length;
      }).catch(() => { card.querySelector('[data-count]').textContent = '?'; });
    });

    /* ===== Employee Summary Table ===== */
    let summaryRows = [];

    function statusBadge(v) {
      if (v === 'Active') return 'bg-green-50 text-green-700 ring-green-200';
      if (v === 'Inactive') return 'bg-slate-100 text-slate-600 ring-slate-200';
      if (v === 'On Leave') return 'bg-amber-50 text-amber-700 ring-amber-200';
      if (v === 'Terminated') return 'bg-red-50 text-red-700 ring-red-200';
      return 'bg-slate-50 text-slate-700 ring-slate-200';
    }

    function dash(v) { return (v === null || v === undefined || v === '') ? '—' : esc(v); }

    function renderSummary() {
      const q = document.getElementById('summarySearch').value.trim().toLowerCase();
      const keys = ['emp_id','full_name','role','status','mgmt_id','tlead_name','sme_name','training_id','shift_value','room_name'];
      const filtered = !q ? summaryRows : summaryRows.filter((r) => keys.some((k) => String(r[k] ?? '').toLowerCase().includes(q)));
      document.getElementById('summaryCount').textContent = `${filtered.length} employee(s)`;
      const tbody = document.getElementById('summaryBody');
      if (filtered.length === 0) {
        tbody.innerHTML = `<tr><td colspan="10" class="px-4 py-8 text-center text-slate-500">No records.</td></tr>`;
        return;
      }
      tbody.innerHTML = filtered.map((r) => `
        <tr class="hover:bg-slate-50">
          <td class="px-4 py-3 font-mono">${dash(r.emp_id)}</td>
          <td class="px-4 py-3">${dash(r.full_name)}</td>
          <td class="px-4 py-3">${dash(r.role)}</td>
          <td class="px-4 py-3"><span class="rounded-full px-2 py-0.5 text-xs ring-1 ring-inset ${statusBadge(r.status)}">${dash(r.status)}</span></td>
          <td class="px-4 py-3 font-mono">${dash(r.mgmt_id)}</td>
          <td class="px-4 py-3">${dash(r.tlead_name)}</td>
          <td class="px-4 py-3">${dash(r.sme_name)}</td>
          <td class="px-4 py-3 font-mono">${dash(r.training_id)}</td>
          <td class="px-4 py-3">${dash(r.shift_value)}</td>
          <td class="px-4 py-3">${dash(r.room_name)}</td>
        </tr>`).join('');
    }

    async function loadSummary() {
      const tbody = document.getElementById('summaryBody');
      tbody.innerHTML = `<tr><td colspan="10" class="px-4 py-8 text-center text-slate-500">Loading…</td></tr>`;
      try {
        const data = await api('GET', '/api/dashboard/summary');
        summaryRows = Array.isArray(data) ? data : (data.items || []);
        renderSummary();
      } catch (e) {
        tbody.innerHTML = `<tr><td colspan="10" class="px-4 py-8 text-center text-red-600">${esc(e.message)}</td></tr>`;
      }
    }

    document.getElementById('summarySearch').addEventListener('input', renderSummary);
    loadSummary();
  </script>
</body>
</html>
